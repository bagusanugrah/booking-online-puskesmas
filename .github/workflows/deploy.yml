name: CI/CD Puskesmas Pipeline

on:
  push:
    branches:
      - main # Ubah jadi master jika nama branch utama kamu master

jobs:
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi SSH ke Mesin Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          # Kita lempar variabel VITE_API_URL dari GitHub Secrets ke dalam script
          envs: VITE_API_URL
          script: |
            cd booking-online-puskesmas
            git pull origin main
            
            # --- BAGIAN AJAIB: Membuat .env secara otomatis ---
            echo "VITE_API_URL=${VITE_API_URL}" > frontend/.env
            # --------------------------------------------------
            
            sudo docker-compose down
            sudo docker-compose up -d --build frontend

  deploy-backend:
    name: Deploy Backend via Jump Host
    runs-on: ubuntu-latest
    needs: deploy-frontend # Menunggu frontend selesai dulu
    steps:
      - name: Eksekusi SSH ke Mesin Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          # Ini adalah teknik Jump Host untuk menembus IP Private
          proxy_host: ${{ secrets.FRONTEND_IP }}
          proxy_username: ${{ secrets.USERNAME }}
          proxy_key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            cd booking-online-puskesmas
            git pull origin main
            sudo docker-compose down
            sudo docker-compose up -d --build backend
